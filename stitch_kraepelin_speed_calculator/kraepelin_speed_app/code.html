<style>
        body {

        .numpad-btn {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: transform 0.05s ease-out, background-color 0.1s ease;

        .numpad-btn-active {
            transform: translateY(2px);
            box-shadow: none;
            background-color: #475569 !important;
        }

        /* Pulse animation for incorrect answers */
        @keyframes pulse-error {
            0% { color: #111c2d; }
            50% { color: #ba1a1a; }
            100% { color: #111c2d; }
        }
        .anim-error {
            animation: pulse-error 0.3s ease-in-out;
        }

        /* Scale animation for correct answers */
        @keyframes scale-correct {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .anim-correct {
            animation: scale-correct 0.2s ease-out;
        }

</div>
<!-- TopAppBar (JSON Sourced) -->
<header class="bg-background dark:bg-background flex justify-between items-center w-full px-container-padding py-4 z-40">

</header>
<!-- Calculation Workspace (Center Canvas) -->
<main class="flex-1 flex flex-col justify-center items-center px-container-padding pb-[300px]">

<!-- Previous Number (Number A) -->

<div class="w-16 h-px bg-outline-variant my-2"></div>

<!-- Gameplay Logic & Micro-interactions -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const num1El = document.getElementById('num1');
            const num2El = document.getElementById('num2');
            const scoreEl = document.getElementById('score');
            const timerEl = document.getElementById('timer');
            const progressBar = document.getElementById('progress-bar');
            
            let currentNum1 = parseInt(num1El.innerText);
            let currentNum2 = parseInt(num2El.innerText);
            let score = 0;
            let timeLeft = 60;
            
            // Expected answer logic (Kraepelin: sum modulo 10)
            const getExpectedAnswer = (a, b) => (a + b) % 10;
            
            const generateNextNumber = () => Math.floor(Math.random() * 9) + 1; // 1-9
            
            const handleInput = (inputVal) => {
                const expected = getExpectedAnswer(currentNum1, currentNum2);
                
                if (inputVal === expected) {
                    // Correct
                    score++;
                    scoreEl.innerText = score;
                    
                    // Animation
                    num2El.classList.remove('anim-correct', 'anim-error');
                    void num2El.offsetWidth; // trigger reflow
                    num2El.classList.add('anim-correct');
                    
                    // Shift numbers
                    currentNum1 = currentNum2;
                    currentNum2 = generateNextNumber();
                    
                    num1El.innerText = currentNum1;
                    num2El.innerText = currentNum2;
                } else {
                    // Incorrect
                    num2El.classList.remove('anim-correct', 'anim-error');
                    void num2El.offsetWidth;
                    num2El.classList.add('anim-error');
                    
                    // Slight penalty or visual feedback only
                }
            };

            // Keyboard support for testing
            document.addEventListener('keydown', (e) => {
                if (e.key >= '0' && e.key <= '9') {
                    const btn = document.getElementById(`numpad-btn-${e.key}`);
                    if(btn) {
                        btn.classList.add('numpad-btn-active');
                        handleInput(parseInt(e.key));
                        setTimeout(() => btn.classList.remove('numpad-btn-active'), 100);
                    }
                }
            });

            // Numpad clicks
            document.querySelectorAll('.numpad-btn').forEach(btn => {
                // Prevent default double-tap zoom
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    btn.classList.add('numpad-btn-active');
                    handleInput(parseInt(btn.innerText));
                }, {passive: false});
                
                btn.addEventListener('touchend', () => {
                    btn.classList.remove('numpad-btn-active');
                });

                // Fallback for mouse
                btn.addEventListener('mousedown', () => {
                    btn.classList.add('numpad-btn-active');
                    handleInput(parseInt(btn.innerText));
                });
                btn.addEventListener('mouseup', () => btn.classList.remove('numpad-btn-active'));
                btn.addEventListener('mouseleave', () => btn.classList.remove('numpad-btn-active'));
            });

            // Simple Timer
            const timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = `${timeLeft}s`;
                progressBar.style.transform = `scaleX(${timeLeft / 60})`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerEl.innerText = "0s";
                    // Game Over state could go here
                }
            }, 1000);
        });
    </script>
